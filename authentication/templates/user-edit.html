    <div class="container min-vh-100 d-flex justify-content-center py-5 content">
        <div class="card border-0 shadow-lg login-card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-5">
                    <h2 class="fw-bold mb-2 welcome">Change Password</h2>
                    <p class="text-secondary mb-0">
                        Change your password and keep your account secure.
                    </p>
                </div>

                <form action="" method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" placeholder="User Name" value="{{ user.username }}" name="user_name">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Email" value="{{ user.email }}" name="email" >
                    </div>

                    <div class="input-box phone mb-4">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" placeholder="Phone Number" id="phone-input"
                            name="phone_input" value="{{ user.phone_number }}">
                    </div>
                    {% if err %}
                        <p class="error">*{{ err }}</p>
                    {% endif %}

                    <button class="btn btn-primary w-100 py-3 fw-semibold" type="submit">
                        Submit
                    </button>
                </form>

            </div>
        </div>
    </div>
{% endblock %}


{% block link %}
    <link rel="stylesheet" href="{% static 'css/content.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block script %}
    <script src="{% static "js/register.js" %}"></script>
{% endblock %}
